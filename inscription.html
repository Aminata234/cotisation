<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - Cotisations ODC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-wrap">
        <div class="auth-card" style="max-width:500px">
            <h1>Créer un compte</h1>
            <p style="text-align:center;color:#6b7280;margin-bottom:24px">Choisissez votre profil</p>
            
            <div style="display:grid;gap:12px">
                <a href="inscription.gerant.html" class="card" style="text-align:center;padding:20px;border:2px solid #e5e7eb;text-decoration:none;color:inherit">
                    <h3 style="color:#2563eb;margin-bottom:8px">Je suis Gérant</h3>
                    <p style="font-size:14px;color:#6b7280">Collecter, enregistrer, relancer les cotisations</p>
                </a>
                
                <a href="inscription.coach.html" class="card" style="text-align:center;padding:20px;border:2px solid #e5e7eb;text-decoration:none;color:inherit">
                    <h3 style="color:#2563eb;margin-bottom:8px">Je suis Coach</h3>
                    <p style="font-size:14px;color:#6b7280">Superviser, auditer, consulter les stats</p>
                </a>
                
                <a href="inscription.apprenant.html" class="card" style="text-align:center;padding:20px;border:2px solid #e5e7eb;text-decoration:none;color:inherit">
                    <h3 style="color:#2563eb;margin-bottom:8px">Je suis Apprenant</h3>
                    <p style="font-size:14px;color:#6b7280">Consulter mon solde, payer mes cotisations</p>
                </a>
            </div>
            
            <p style="text-align:center;margin-top:24px;font-size:14px;color:#6b7280">
                Déjà un compte ? <a href="index.html" class="btn-link">Se connecter</a>
            </p>
        </div>
    </div>
</body>
</html>
