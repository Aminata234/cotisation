<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Apprenant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-wrap">
        <div class="auth-card">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRcgVDDya8SlJL4h9zhihJ2Rnhpz7sWgQP-wLNt_Qi1zA&s=10" alt="Logo" class="logo-img">
            <h1>Espace Apprenant</h1>
            <form action="dashboard.apprenant.html">
                <div class="form-group">
                    <label>Email ou Téléphone</label>
                    <input type="text" placeholder="awa.diop@odc.sn" required>
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Accéder à mon espace</button>
                <p style="text-align: center; margin-top: 16px; font-size: 14px;">
                    <a href="#" style="color: #2563eb;">Pas encore inscrit ? S'auto-inscrire</a>
                </p>
            </form>
        </div>
    </div>
</body>
</html>
