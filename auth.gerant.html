<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Gérant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-wrap">
        <div class="auth-card">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRcgVDDya8SlJL4h9zhihJ2Rnhpz7sWgQP-wLNt_Qi1zA&s=10" alt="Logo" class="logo-img">
            <h1>Connexion Gérant</h1>
            <form action="dashboard.gerant.html">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" placeholder="gerant@odc.sn" required>
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Se connecter</button>
            </form>
        </div>
    </div>
</body>
</html>
