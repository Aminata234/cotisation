<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Cotisations ODC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-wrap">
        <div class="auth-card">

            <div class="container-sm" style="text-align: center; padding-top: 80px;">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRcgVDDya8SlJL4h9zhihJ2Rnhpz7sWgQP-wLNt_Qi1zA&s=10" alt="ODC" style="width: 100px; margin: 0 auto 24px;">
            </div>
            <h1>Connexion</h1>
            <form id="formLogin">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required placeholder="user@odc.sn">
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary btn-full" >Se connecter</button>
            </form>
            
            <p style="text-align:center;margin-top:24px;font-size:14px;color:#6b7280">
                Pas encore de compte ? <a href="inscription.html" class="btn-link">S'inscrire</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('formLogin').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Récupère les users du localStorage
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const user = users.find(u => u.email === email && u.password === password);
            
            if (!user) {
                alert('Email ou mot de passe incorrect');
                return;
            }
            
            // Stocke l'utilisateur connecté
            localStorage.setItem('currentUser', JSON.stringify(user));
            
            // Redirige vers le bon dashboard selon le rôle
            if (user.role === 'gerant') {
                window.location.href = 'dashboard.gerant.html';
            } else if (user.role === 'coach') {
                window.location.href = 'dashboard.coach.html';
            } else if (user.role === 'apprenant') {
                window.location.href = 'dashboard.apprenant.html';
            }
        });
    </script>
</body>
</html>
