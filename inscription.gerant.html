<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription Gérant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-wrap">
        <div class="auth-card">
            <h1>Inscription Gérant</h1>
            <p style="text-align:center;color:#6b7280;margin-bottom:24px">Responsable des cotisations</p>
            
            <form>
                <div class="form-group">
                    <label>Nom complet</label>
                    <input type="text" required placeholder="Mamadou WANE">
                </div>
                
                <div class="form-group">
                    <label>Email professionnel</label>
                    <input type="email" required placeholder="mamadou@odc.sn">
                </div>

                <div class="form-group">
                    <label>Classe</label>
                    <input type="email" required placeholder="Dev Web/Mobile">
                </div>
                
                <div class="form-group">
                    <label>Téléphone</label>
                    <input type="tel" required placeholder="77 123 45 67">
                </div>
                
                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="password" required placeholder="••••••••" minlength="8">
                    <p class="form-hint">Minimum 8 caractères</p>
                </div>
                
                <div class="form-group">
                    <label>Confirmer le mot de passe</label>
                    <input type="password" required placeholder="••••••••">
                </div>
                
                <div class="form-group">
                    <label>Code d'accès Gérant</label>
                    <input type="text" required placeholder="Code fourni par ODC">
                    <p class="form-hint">Demandez le code à votre superviseur</p>
                </div>
                
                <button type="submit" class="btn btn-full"><a href="auth.gerant.html">Créer mon compte</a></button>
            </form>
            
            <p style="text-align:center;margin-top:24px;font-size:14px;color:#6b7280">
                Déjà inscrit ? <a href="index.html" class="btn-link">Se connecter</a>
            </p>
        </div>
    </div>
</body>
</html>
