<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription Coach</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-wrap">
        <div class="auth-card">
            <h1>Inscription Coach</h1>
            <p style="text-align:center;color:#6b7280;margin-bottom:24px">Superviseur de classe</p>
            
            <form>
                <div class="form-group">
                    <label>Nom complet</label>
                    <input type="text" required placeholder="Birane WANE">
                </div>
                
                <div class="form-group">
                    <label>Email professionnel</label>
                    <input type="email" required placeholder="coachwane@odc.sn">
                </div>
                
                <div class="form-group">
                    <label>Classe supervisée</label>
                    <select required>
                        <option value="">Sélectionner...</option>
                        <option>Dev Web/Mobile </option>
                        <option>Data</option>
                        <option>Hackeuse</option>
                        <option>Ref Dig</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="password" required placeholder="••••••••" minlength="8">
                </div>
                
                <div class="form-group">
                    <label>Confirmer le mot de passe</label>
                    <input type="password" required placeholder="••••••••">
                </div>
                
                <button type="submit" class="btn btn-full">Créer mon compte</button>
            </form>
            
            <p style="text-align:center;margin-top:24px;font-size:14px;color:#6b7280">
                Déjà inscrit ? <a href="index.html" class="btn-link">Se connecter</a>
            </p>
        </div>
    </div>
</body>
</html>
