<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription Apprenant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-wrap">
        <div class="auth-card">
            <h1>Inscription Apprenant</h1>
            <p style="text-align:center;color:#6b7280;margin-bottom:24px">Rejoignez votre classe</p>
            
            <form>
                <div class="form-group">
                    <label>Nom complet</label>
                    <input type="text" required placeholder="Awa Diop">
                </div>
                
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" required placeholder="awa@odc.sn">
                </div>
                
                <div class="form-group">
                    <label>Téléphone</label>
                    <input type="tel" required placeholder="77 123 45 67">
                </div>
                
                <div class="form-group">
                    <label>Classe</label>
                    <select required>
                        <option value="">Sélectionner...</option>
                        <option>Dev Web/Mobile </option>
                        <option>Data</option>
                        <option>Hackeuse</option>
                        <option>Ref Dig</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Matricule ODC</label>
                    <input type="text" required placeholder="ODC2026-001">
                    <p class="form-hint">Fourni par votre gérant</p>
                </div>
                
                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="password" required placeholder="••••••••" minlength="8">
                </div>
                
                <div class="form-group">
                    <label>Confirmer le mot de passe</label>
                    <input type="password" required placeholder="••••••••">
                </div>
                
                <button type="submit" class="btn btn-full"><a href="auth.apprenant.html" class="btn-link">Créer mon compte</a></button>
            </form>
            
            <p style="text-align:center;margin-top:24px;font-size:14px;color:#6b7280">
                Déjà inscrit ? <a href="index.html" class="btn-link">Se connecter</a>
            </p>
        </div>
    </div>
</body>
</html>
